<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Rimina レッスン予約</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
:root {
  --primary: #c06080;
  --primary-light: #d48a9e;
  --primary-dark: #b8809a;
  --primary-bg: #fdf2f6;
  --accent: #e8a8b8;
  --bg: #fffafc;
  --surface: #ffffff;
  --text: #4a3540;
  --text-soft: #8a7480;
  --border: #f0d8e0;
  --type-femB: #f4a8c0;
  --type-femP: #e85a85;
  --type-recovery: #c8e0d8;
  --type-sline: #f0c0a0;
  --type-vshil: #b8a8d8;
  --type-burnL: #ffd0a0;
  --type-burnH: #ff8060;
  --type-physL: #c0d8b8;
  --type-physH: #80b888;
  --type-physA: #4a9858;
  --line-green: #06c755;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic UI", sans-serif; background: var(--bg); color: var(--text); }
body { max-width: 720px; margin: 0 auto; padding-bottom: 80px; }
header { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 50%, var(--primary-dark) 100%); color: white; padding: 28px 20px 24px; text-align: center; position: relative; }
header h1 { font-size: 22px; letter-spacing: 0.05em; font-weight: 600; }
header .sub { font-size: 12px; opacity: 0.9; margin-top: 4px; }
.userbar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: var(--primary-bg); font-size: 12px; color: var(--text-soft); border-bottom: 1px solid var(--border); }
.userbar a { color: var(--primary); text-decoration: none; font-weight: 600; }
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.tab-btn { flex: 1; padding: 14px 4px; background: none; border: none; cursor: pointer; font-size: 13px; color: var(--text-soft); border-bottom: 3px solid transparent; transition: all .2s; -webkit-tap-highlight-color: rgba(192,96,128,0.15); }
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; background: var(--primary-bg); }
.tab-btn:active { background: var(--primary-bg); }
.tab-emoji { display: block; font-size: 18px; margin-bottom: 2px; }
.view { display: none; padding: 16px; }
.view.active { display: block; }

/* Calendar */
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.cal-header h2 { font-size: 18px; font-weight: 600; }
.cal-header button { background: var(--primary); color: white; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; }
.cal-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 2px; width: 100%; overflow: hidden; }
.cal-head { text-align: center; padding: 6px 0; font-size: 11px; color: var(--text-soft); font-weight: 600; min-width: 0; }
.cal-head.sun { color: #d4767a; }
.cal-head.sat { color: #6b94c4; }
.cal-cell { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 3px; min-height: 70px; min-width: 0; overflow: hidden; cursor: pointer; transition: all .15s; display: flex; flex-direction: column; gap: 2px; }
.cal-cell.empty { background: transparent; border: none; cursor: default; }
.cal-cell.today { box-shadow: 0 0 0 2px var(--primary); }
.cal-cell.selected { background: var(--primary-bg); border-color: var(--primary); }
.cal-cell.past { opacity: 0.5; cursor: not-allowed; }
.day-num { font-size: 12px; font-weight: 600; color: var(--text); }
.day-num.sun { color: #d4767a; }
.day-num.sat { color: #6b94c4; }
.lesson-tile { font-size: 8.5px; padding: 1px 3px; border-radius: 3px; background: white; border-left: 3px solid var(--primary); color: var(--text); line-height: 1.25; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; max-width: 100%; }
.lesson-tile.full { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }
.lesson-tile-time { font-weight: 700; }
.lesson-tile-name { display: none; }
.more-tile { font-size: 8px; color: var(--text-soft); text-align: center; padding: 1px; }

@media (min-width: 480px) {
  .lesson-tile { font-size: 9.5px; padding: 2px 4px; }
  .lesson-tile-name { display: inline; }
}
@media (min-width: 600px) {
  .cal-cell { min-height: 110px; padding: 4px; }
  .lesson-tile { font-size: 11px; padding: 3px 6px; }
  .day-num { font-size: 13px; }
}

/* Day detail (under calendar) */
.day-detail { margin-top: 16px; display: none; }
.day-detail.show { display: block; }
.day-detail h3 { font-size: 16px; margin-bottom: 12px; color: var(--primary); }

/* Lesson card */
.lesson-card { background: var(--surface); border-radius: 10px; border-left: 5px solid var(--primary); padding: 12px 14px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; box-shadow: 0 1px 3px rgba(192,96,128,0.06); }
.lesson-card.full { opacity: 0.55; }
.lesson-time-block { min-width: 60px; text-align: center; }
.lesson-time { font-size: 18px; font-weight: 700; color: var(--primary); }
.lesson-body { flex: 1; min-width: 0; }
.lesson-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.lesson-desc { font-size: 11px; color: var(--text-soft); line-height: 1.45; margin: 3px 0 5px; }
.lesson-target { font-size: 10.5px; color: var(--primary); margin-bottom: 4px; }
.lesson-meta { font-size: 11px; color: var(--text-soft); }
.lesson-availability { font-size: 11px; margin-top: 4px; color: var(--text-soft); }
.lesson-availability.full { color: #d4767a; font-weight: 600; }
.book-btn { background: var(--primary); color: white; border: none; padding: 8px 14px; border-radius: 18px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.book-btn:disabled { background: #ccc; cursor: not-allowed; }

/* Borders by lesson type */
.t-femB { border-left-color: var(--type-femB); }
.t-femP { border-left-color: var(--type-femP); }
.t-recovery { border-left-color: var(--type-recovery); }
.t-sline { border-left-color: var(--type-sline); }
.t-vshil { border-left-color: var(--type-vshil); }
.t-burnL { border-left-color: var(--type-burnL); }
.t-burnH { border-left-color: var(--type-burnH); }
.t-physL { border-left-color: var(--type-physL); }
.t-physH { border-left-color: var(--type-physH); }
.t-physA { border-left-color: var(--type-physA); }

/* Coach / Lesson select cards */
.select-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.select-card { background: var(--surface); border: 2px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: all .15s; text-align: center; }
.select-card:hover { border-color: var(--primary); transform: translateY(-1px); }
.select-card .name { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
.select-card .desc { font-size: 11px; color: var(--text-soft); }
.back-btn { background: none; border: 1px solid var(--border); color: var(--text-soft); padding: 6px 14px; border-radius: 16px; font-size: 12px; margin-bottom: 14px; cursor: pointer; }

/* My bookings */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-soft); font-size: 13px; }
.cancel-btn { background: white; color: #d4767a; border: 1px solid #d4767a; padding: 6px 12px; border-radius: 14px; font-size: 12px; cursor: pointer; }
.meet-btn { display:inline-block; background: #1a73e8; color: white !important; border: none; padding: 6px 12px; border-radius: 14px; font-size: 12px; font-weight: 600; text-decoration: none; white-space: nowrap; margin-right: 6px; }
.meet-btn:hover { background: #1557b0; }
.meet-btn:active { background: #0d47a1; }
.status-badge { padding: 5px 12px; border-radius: 14px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.status-badge.done { background:#eef3ee; color:#5f9c70; }
.status-badge.soon { background:#fdf0e6; color:#c98a4b; }
.status-badge.cancelled { background:#f0f0f0; color:#999; }
.lesson-card.cancelled { opacity:0.6; }
.lesson-icon-sq { width:42px; height:42px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:22px; margin-top:8px; background:var(--primary-bg); }
.coach-col { position:relative; display:flex; flex-direction:column; align-items:center; padding-bottom:12px; }
.coach-avatar { width:84px; height:84px; border-radius:50%; background-size:cover; background-position:center; background-color:var(--primary-bg); border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,0.15); }
.coach-avatar-ph { display:flex; align-items:center; justify-content:center; font-weight:800; color:var(--primary); font-size:32px; }
.coach-col .book-btn { position:absolute; bottom:-4px; left:50%; transform:translateX(-50%); padding:4px 12px; font-size:11px; border-radius:14px; box-shadow:0 2px 6px rgba(192,96,128,0.5); }

/* Modal */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
.modal.hidden { display: none; }
.modal-content { background: var(--surface); width: 100%; max-width: 480px; border-radius: 16px 16px 0 0; padding: 20px; max-height: 80vh; overflow-y: auto; }
.modal-content h3 { font-size: 17px; margin-bottom: 12px; color: var(--primary); }
.modal-summary { background: var(--primary-bg); border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 13px; line-height: 1.6; }
.modal-summary strong { color: var(--primary); }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text-soft); margin-bottom: 4px; font-weight: 600; }
.form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 16px; font-family: inherit; }
.form-group input:focus { outline: none; border-color: var(--primary); }
.modal-actions { display: flex; gap: 8px; }
.modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
.modal-cancel { background: #f0f0f0; color: var(--text); }
.modal-confirm { background: var(--primary); color: white; }
.modal-confirm:disabled { background: #ccc; }

/* Toast */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 12px 20px; border-radius: 24px; font-size: 13px; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.toast.error { background: #d4767a; }
.toast.success { background: var(--line-green); }

/* Loading */
.loading { text-align: center; padding: 40px; color: var(--text-soft); font-size: 13px; }

/* History */
.history-periods { display: flex; gap: 8px; padding: 14px 16px 0; }
.hp-btn { flex: 1; padding: 8px 4px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px; font-size: 13px; font-weight: 600; color: var(--text-soft); cursor: pointer; }
.hp-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.h-total { text-align: center; padding: 24px 12px 16px; }
.h-total .num { font-family: 'Lato',sans-serif; font-size: 56px; font-weight: 900; color: var(--primary); line-height: 1; }
.h-total .num .unit { font-size: 22px; font-weight: 700; margin-left: 4px; color: var(--text); }
.h-total .lab { color: var(--text-soft); font-size: 12px; margin-top: 4px; letter-spacing: .05em; }
.h-section { padding: 0 16px 18px; }
.h-section h3 { font-size: 13px; color: var(--text-soft); margin: 0 0 10px; font-weight: 700; letter-spacing: .05em; }
.h-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.h-lesson-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 14px; }
.h-lesson-row + .h-lesson-row { border-top: 1px dashed var(--border); }
.h-lesson-row .name { flex: 1; color: var(--text); }
.h-lesson-row .bar-wrap { flex: 1.2; height: 8px; background: var(--primary-bg); border-radius: 4px; overflow: hidden; }
.h-lesson-row .bar { height: 100%; background: linear-gradient(90deg, var(--primary-light), var(--primary)); border-radius: 4px; }
.h-lesson-row .cnt { width: 40px; text-align: right; font-family: 'Lato',sans-serif; font-weight: 800; color: var(--primary); }
.h-month-chart { display: flex; align-items: flex-end; gap: 6px; height: 150px; padding: 0 4px; }
.h-month-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.h-month-bar { width: 100%; background: linear-gradient(180deg, var(--primary), var(--primary-light)); border-radius: 6px 6px 0 0; min-height: 4px; }
.h-month-bar.zero { background: var(--border); min-height: 2px; }
.h-month-lab { font-size: 10px; color: var(--text-soft); white-space: nowrap; }
.h-month-cnt { font-size: 11px; font-weight: 700; color: var(--primary); font-family: 'Lato',sans-serif; }
.h-recent-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 13px; }
.h-recent-item + .h-recent-item { border-top: 1px dashed var(--border); }
.h-recent-item .date { color: var(--text-soft); font-family: 'Lato',sans-serif; font-size: 12px; width: 75px; }
.h-recent-item .lesson { flex: 1; color: var(--text); }
.h-recent-item .coach { color: var(--primary); font-size: 11px; font-weight: 700; background: var(--primary-bg); padding: 3px 8px; border-radius: 10px; }
.h-empty { text-align: center; padding: 40px 20px; color: var(--text-soft); font-size: 13px; line-height: 1.7; }
</style>
</head>
<body>
<header>
  <h1>Rimina レッスン予約</h1>
  <div class="sub">女性専用オンラインフィットネスサロン</div>
</header>

<div class="userbar">
  <span id="userInfo">読み込み中...</span>
  <span id="bookingCount" style="color:var(--primary);font-size:11px"></span>
</div>
<div id="balanceBar" style="display:none;background:linear-gradient(90deg, var(--primary-bg), white);padding:8px 16px;border-bottom:1px solid var(--border);font-size:12px;display:flex;justify-content:space-between;align-items:center;gap:8px">
  <span id="planLabel" style="color:var(--text-soft)"></span>
  <span id="remainingLabel" style="color:var(--primary);font-weight:700"></span>
</div>

<nav class="tabs">
  <button class="tab-btn active" onclick="switchTab('calendar')"><span class="tab-emoji">📅</span>カレンダー</button>
  <button class="tab-btn" onclick="switchTab('coach')"><span class="tab-emoji">👩‍🏫</span>コーチ</button>
  <button class="tab-btn" onclick="switchTab('lesson')"><span class="tab-emoji">🌸</span>レッスン</button>
  <button class="tab-btn" onclick="switchTab('mybookings')"><span class="tab-emoji">📋</span>予約</button>
  <button class="tab-btn" onclick="switchTab('history')"><span class="tab-emoji">📊</span>履歴</button>
</nav>

<main>
  <section id="view-calendar" class="view active">
    <div class="cal-header">
      <button onclick="changeMonth(-1)">‹</button>
      <h2 id="monthLabel">2026年 5月</h2>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="day-detail" id="dayDetail"></div>
  </section>

  <section id="view-coach" class="view">
    <div id="coachContent"></div>
  </section>

  <section id="view-lesson" class="view">
    <div id="lessonContent"></div>
  </section>

  <section id="view-mybookings" class="view">
    <div id="myBookingsContent"></div>
  </section>

  <section id="view-history" class="view">
    <div class="history-periods">
      <button class="hp-btn active" onclick="switchHistoryPeriod('month')">今月</button>
      <button class="hp-btn" onclick="switchHistoryPeriod('year')">今年</button>
      <button class="hp-btn" onclick="switchHistoryPeriod('all')">全期間</button>
    </div>
    <div id="historyContent">
      <div style="text-align:center;padding:40px;color:var(--text-soft);">読み込み中…</div>
    </div>
  </section>
</main>

<div id="bookingModal" class="modal hidden">
  <div class="modal-content">
    <h3>このレッスンを予約しますか？</h3>
    <div class="modal-summary" id="modalSummary"></div>
    <form id="bookingForm" onsubmit="confirmBooking(event)">
      <div class="form-group">
        <label>お名前</label>
        <input type="text" id="nameInput" required placeholder="例：山田 花子" autocomplete="name">
      </div>
      <div class="modal-actions">
        <button type="button" class="modal-cancel" onclick="closeModal()">やめる</button>
        <button type="submit" class="modal-confirm" id="confirmBtn">予約を確定する</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

function lcGet(key) {

function lcSet(key, value) {

}
function invalidateAllCaches() {
  monthCache.clear();

  try {
    Object.keys(localStorage).forEach(k => { if (k.startsWith('rimina_lessons_') || k.startsWith('rimina_bookings_')) localStorage.removeItem(k); });
  } catch {}
}

// ==========================================================================
// API helpers
// ==========================================================================
async function api(action, params = {}, method = 'GET', body = null) {
  let url = API_BASE_URL + '?action=' + action;
  for (const k in params) url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
  const opts = { method, redirect: 'follow' };
  if (body) {
    opts.body = JSON.stringify({ action, ...body });
    opts.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
  }
  const res = await fetch(url, opts);
  return await res.json();
}

async function fetchAvailability(from, to) {
  const data = await api('availability', { from, to });
  if (data.ok) allLessons = data.lessons;
  return data;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;

  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function ymd(y, m, d) {
  return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

function lessonTypeMeta(name) {
  return LESSON_TYPES[name] || { short: name, cls: 't-femB', cat: [] };
}

function isPast(date, time) {
  const [Y,M,D] = date.split('-').map(Number);
  const [h,m] = time.split(':').map(Number);
  return new Date(Y, M-1, D, h, m).getTime() < Date.now();
}
function isBookable(lesson) {
  if (lesson.available <= 0) return false;
  if (!lesson.bookable_until) return true;
  const m = lesson.bookable_until.match(/(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})/);
  if (!m) return true;
  const limit = new Date(+m[1], +m[2]-1, +m[3], +m[4], +m[5]);
  return Date.now() < limit.getTime();
}

// Tabs
// ==========================================================================
function switchTab(tab) {
  // 視覚フィードバックを最優先（同期的に切り替える）
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    const tabs = ['calendar','coach','lesson','mybookings','history'];
    btn.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  const target = document.getElementById('view-' + tab);
  if (target) target.classList.add('active');

  // 各タブのレンダリング（キャッシュがあれば即座に表示される）
  if (tab === 'coach') renderCoachList();
  if (tab === 'lesson') renderLessonList();
  if (tab === 'mybookings') renderMyBookings();
  if (tab === 'history') loadHistory();

  // タブのすぐ下にスムーズスクロール（自動でページ最上部に飛ぶことはしない）
  const tabsEl = document.querySelector('.tabs');
  if (tabsEl) {
    const top = tabsEl.getBoundingClientRect().top + window.pageYOffset - 0;
    if (window.pageYOffset > top + 60) window.scrollTo({ top, behavior: 'smooth' });
  }
}

// ==========================================================================
// Calendar
// ==========================================================================
async function loadMonth() {
  const cacheKey = currentYear + '-' + currentMonth;

  // 1. メモリキャッシュ（最速）
  const memCached = monthCache.get(cacheKey);
  if (memCached) {
    allLessons = memCached.lessons;
    renderCalendar();
    if (Date.now() - memCached.fetchedAt > CACHE_TTL_MS) refreshMonth(cacheKey, false);
    return;
  }

  // 2. localStorageキャッシュ（次に速い、ページ再読み込み後でも生きてる）
  const lc = lcGet('lessons_' + cacheKey);
  if (lc && lc.lessons && (Date.now() - lc.fetchedAt < LC_TTL_MS)) {
    allLessons = lc.lessons;
    monthCache.set(cacheKey, lc);
    renderCalendar();
    // 30秒以上古ければ裏でリフレッシュ
    if (Date.now() - lc.fetchedAt > CACHE_TTL_MS) refreshMonth(cacheKey, false);
    return;
  }

  // 3. キャッシュなし：空のカレンダーを先に表示してから取得（読み込み中の白画面回避）
  allLessons = [];
  renderCalendar();
  await refreshMonth(cacheKey, true);
}

async function refreshMonth(cacheKey, showError) {
  const [Y, M] = cacheKey.split('-').map(Number);
  const from = ymd(Y, M, 1);
  const to = ymd(Y, M, new Date(Y, M+1, 0).getDate());
  const r = await fetchAvailability(from, to);
  if (!r.ok) {
    if (showError) document.getElementById('calGrid').innerHTML = '<div style="grid-column:1/-1" class="loading">読み込み失敗: ' + (r.error || '') + '</div>';
    return;
  }
  const cacheData = { lessons: r.lessons, fetchedAt: Date.now() };
  monthCache.set(cacheKey, cacheData);
  lcSet('lessons_' + cacheKey, cacheData);
  if ((currentYear + '-' + currentMonth) === cacheKey) {
    allLessons = r.lessons;
    renderCalendar();
    if (selectedDate) selectDate(selectedDate);
  }
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const label = document.getElementById('monthLabel');
  label.textContent = currentYear + '年 ' + (currentMonth+1) + '月';
  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const daysInMonth = new Date(currentYear, currentMonth+1, 0).getDate();

  let html = '';
  ['日','月','火','水','木','金','土'].forEach((w, i) => {
    let cls = 'cal-head';
    if (i===0) cls += ' sun';
    if (i===6) cls += ' sat';
    html += '<div class="' + cls + '">' + w + '</div>';
  });
  for (let i = 0; i < firstDay; i++) html += '<div class="cal-cell empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const dateKey = ymd(currentYear, currentMonth, d);
    const dow = (firstDay + d - 1) % 7;
    const isToday = today.getFullYear()===currentYear && today.getMonth()===currentMonth && today.getDate()===d;
    const isPastDay = new Date(currentYear, currentMonth, d).setHours(23,59) < Date.now();
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (selectedDate === dateKey) cls += ' selected';
    if (isPastDay) cls += ' past';

    const dayLessons = allLessons.filter(l => l.date === dateKey).sort((a,b) => a.time.localeCompare(b.time));
    const w = window.innerWidth;
    const maxShow = w >= 600 ? 4 : (w >= 480 ? 3 : 2);
    const shown = dayLessons.slice(0, maxShow);
    const more = dayLessons.length - shown.length;

    let dayClass = 'day-num';
    if (dow === 0) dayClass += ' sun';
    if (dow === 6) dayClass += ' sat';

    html += '<div class="' + cls + '" onclick="selectDate(\'' + dateKey + '\', ' + d + ')">';
    html += '<div class="' + dayClass + '">' + d + '</div>';
    for (const l of shown) {
      const t = lessonTypeMeta(l.lesson_name);
      const fullCls = (l.available <= 0 || !isBookable(l)) ? ' full' : '';
      // タイルタップでも予約モーダルではなく日詳細を展開する（誤タップ防止）
      html += '<div class="lesson-tile ' + t.cls + fullCls + '" onclick="event.stopPropagation(); selectDate(\'' + dateKey + '\', ' + d + ')">';
      html += '<span class="lesson-tile-time">' + l.time + '</span><span class="lesson-tile-name"> ' + t.short + '</span>';
      html += '</div>';
    }
    if (more > 0) html += '<div class="more-tile">+' + more + '件</div>';
    html += '</div>';
  }
  grid.innerHTML = html;
}

function selectDate(key, day) {
  selectedDate = key;
  renderCalendar();
  const detail = document.getElementById('dayDetail');
  const lessons = allLessons.filter(l => l.date === key).sort((a,b) => a.time.localeCompare(b.time));
  const date = new Date(...key.split('-').map((v,i)=>i===1?+v-1:+v));
  let html = '<h3>' + (date.getMonth()+1) + '月' + date.getDate() + '日 (' + WEEKDAYS[date.getDay()] + ')</h3>';
  if (lessons.length === 0) {
    html += '<div class="empty-state">この日のレッスンはありません</div>';
  } else {
    for (const l of lessons) html += lessonCardHTML(l);
  }
  detail.innerHTML = html;
  detail.classList.add('show');
  detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function lessonCardHTML(l) {
  const t = lessonTypeMeta(l.lesson_name);
  const bookable = isBookable(l);
  const fullCls = bookable ? '' : ' full';
  const availText = !bookable
    ? (l.available <= 0 ? '満員' : '締切済み')
    : '残り' + l.available + '名';
  const availCls = bookable ? '' : 'full';
  return '<div class="lesson-card ' + t.cls + fullCls + '" style="align-items:flex-start">'
    + '<div class="lesson-time-block" style="padding-top:6px">'
    +   '<div class="lesson-time">' + l.time + '</div>'
    +   '<div class="lesson-icon-sq">' + lessonIcon(l.lesson_name) + '</div>'
    + '</div>'
    + '<div class="lesson-body">'
    +   '<div class="lesson-name">' + l.lesson_name + '</div>'
    +   (t.desc ? '<div class="lesson-desc">' + t.desc + '</div>' : '')
    +   (t.target ? '<div class="lesson-target">▶ ' + t.target + '</div>' : '')
    +   '<div class="lesson-meta">担当: ' + l.coach + ' / 50分　<span class="lesson-availability ' + availCls + '" style="display:inline">' + availText + '</span></div>'
    + '</div>'
    + '<div class="coach-col" style="margin-top:6px">'
    +   coachAvatarHTML(l.coach)

    +     (bookable ? '予約する' : '×')

function changeMonth(delta) {
  currentMonth += delta;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
  selectedDate = null;
  document.getElementById('dayDetail').classList.remove('show');
  loadMonth();
}

function openBooking(lessonId) {
  const l = allLessons.find(x => x.id === lessonId);
  if (!l) { showToast('レッスンが見つかりません', 'error'); return; }
  if (!isBookable(l)) {
    showToast(l.available <= 0 ? '満員です' : '予約締切を過ぎています', 'error');
    return;
  }
  pendingBooking = l;
  const summary = document.getElementById('modalSummary');
  const date = new Date(...l.date.split('-').map((v,i)=>i===1?+v-1:+v));
  const tt = lessonTypeMeta(l.lesson_name);
  summary.innerHTML = '<strong>' + (date.getMonth()+1) + '月' + date.getDate() + '日 (' + WEEKDAYS[date.getDay()] + ') ' + l.time + '</strong><br>'
    + '<span style="font-size:14px;font-weight:600">' + l.lesson_name + '</span>（' + l.coach + ' コーチ）<br>'
    + (tt.desc ? '<div style="font-size:11px;color:var(--text-soft);margin-top:6px;line-height:1.5">' + tt.desc + '</div>' : '')
    + '<span style="color:var(--text-soft);font-size:11px">残り' + l.available + '名 / 50分</span>';
  document.getElementById('nameInput').value = DISPLAY_NAME;
  document.getElementById('bookingModal').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('bookingModal').classList.add('hidden');
  pendingBooking = null;
}

async function confirmBooking(ev) {
  ev.preventDefault();
  if (!pendingBooking) return;
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;

  // 必要な情報を退避
  const lessonId = pendingBooking.id;
  const savedLesson = pendingBooking;
  const tempBookingId = 'temp-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);

  // ★即座にモーダル閉じる、トースト表示、UI更新（API応答を待たない）
  DISPLAY_NAME = name;
  localStorage.setItem('rimina_display_name', name);
  showToast('予約しました 🌸', 'success');
  closeModal();

  // 楽観的にローカル状態を更新
  for (const l of allLessons) {
    if (l.id === lessonId) {
      l.booked = (l.booked || 0) + 1;
      l.available = Math.max(0, l.available - 1);
      break;
    }
  }
  if (!bookingsCache) bookingsCache = { bookings: [], fetchedAt: Date.now() };
  bookingsCache.bookings.push({
    id: tempBookingId,
    lesson_id: lessonId,
    line_user_id: LINE_USER_ID,
    display_name: name,
    name_input: name,
    status: 'active',
    lesson: savedLesson,
    _pending: true
  });
  bookingsCache.bookings.sort((a, b) => {
    const da = a.lesson ? a.lesson.date + a.lesson.time : '';
    const db = b.lesson ? b.lesson.date + b.lesson.time : '';
    return da.localeCompare(db);
  });
  bookingsCache.fetchedAt = Date.now();
  lcSet('bookings_' + LINE_USER_ID, bookingsCache);
  const cacheKey = currentYear + '-' + currentMonth;
  if (monthCache.has(cacheKey)) lcSet('lessons_' + cacheKey, monthCache.get(cacheKey));

  renderCalendar();
  if (selectedDate) selectDate(selectedDate);
  if (document.getElementById('view-mybookings').classList.contains('active')) {
    renderBookingsHTML(bookingsCache.bookings);
  }
  updateBookingCount();
  updateBalanceBar();
  updateUserInfo();

  // 裏でAPI送信
  try {
    const r = await api('booking', {}, 'POST', {
      lesson_id: lessonId,
      name,
      line_user_id: LINE_USER_ID,
      display_name: name
    });
    if (r.ok) {
      // 成功：仮IDを実IDに置き換え
      const idx = bookingsCache.bookings.findIndex(b => b.id === tempBookingId);
      if (idx >= 0) {
        bookingsCache.bookings[idx].id = r.booking_id;
        delete bookingsCache.bookings[idx]._pending;
      }
      lcSet('bookings_' + LINE_USER_ID, bookingsCache);
      // 名前が更新された可能性があるので残回数も裏でリフレッシュ
      refreshBalance();
    } else {
      // 失敗：ロールバック
      rollbackBooking(tempBookingId, lessonId);
      showToast(r.error || '予約に失敗しました', 'error');
    }
  } catch (e) {
    rollbackBooking(tempBookingId, lessonId);
    showToast('通信エラー: ' + e.message, 'error');
  }
}

function rollbackBooking(tempBookingId, lessonId) {
  if (bookingsCache) {
    const idx = bookingsCache.bookings.findIndex(b => b.id === tempBookingId);
    if (idx >= 0) bookingsCache.bookings.splice(idx, 1);
    bookingsCache.fetchedAt = Date.now();
    lcSet('bookings_' + LINE_USER_ID, bookingsCache);
  }
  for (const l of allLessons) {
    if (l.id === lessonId) {
      l.booked = Math.max(0, (l.booked || 0) - 1);
      l.available = Math.min(l.capacity || 3, l.available + 1);
      break;
    }
  }
  const cacheKey = currentYear + '-' + currentMonth;
  if (monthCache.has(cacheKey)) lcSet('lessons_' + cacheKey, monthCache.get(cacheKey));
  renderCalendar();
  if (selectedDate) selectDate(selectedDate);
  if (document.getElementById('view-mybookings').classList.contains('active')) {
    renderBookingsHTML(bookingsCache ? bookingsCache.bookings : []);
  }
  updateBookingCount();
  updateBalanceBar();
}

async function renderMyBookings() {
  const c = document.getElementById('myBookingsContent');

  // 1. メモリキャッシュ
  if (bookingsCache && (Date.now() - bookingsCache.fetchedAt < CACHE_TTL_MS)) {
    renderBookingsHTML(bookingsCache.bookings);
    return;
  }

  // 2. localStorageキャッシュ
  if (!bookingsCache) {
    const lc = lcGet('bookings_' + LINE_USER_ID);
    if (lc && lc.bookings) {
      bookingsCache = lc;
      renderBookingsHTML(lc.bookings);
      updateBookingCount();
      // 古ければ裏でリフレッシュ
      if (Date.now() - lc.fetchedAt > CACHE_TTL_MS) backgroundRefreshBookings();
      return;
    }
  }

  // 3. キャッシュなし：ローディング表示してフェッチ
  c.innerHTML = '<div class="loading">読み込み中...</div>';
  await backgroundRefreshBookings(true);
}

async function backgroundRefreshBookings(showError) {
  const r = await api('my-bookings', { line_user_id: LINE_USER_ID });
  if (!r.ok) {
    if (showError) document.getElementById('myBookingsContent').innerHTML = '<div class="empty-state">読み込みに失敗しました: ' + (r.error||'') + '</div>';
    return;
  }
  bookingsCache = { bookings: r.bookings || [], fetchedAt: Date.now() };
  lcSet('bookings_' + LINE_USER_ID, bookingsCache);
  if (document.getElementById('view-mybookings').classList.contains('active')) {
    renderBookingsHTML(bookingsCache.bookings);
  }
  updateBookingCount();
}

function renderBookingsHTML(bookings) {
  const c = document.getElementById('myBookingsContent');
  let html = '<h2 style="margin-bottom:12px">私の予約</h2>';
  if (!bookings || bookings.length === 0) {
    html += '<div class="empty-state">予約はまだありません<br><br>カレンダーから空きレッスンを選んでください</div>';
  } else {
    for (const b of bookings) {
      if (!b.lesson) continue;
      const t = lessonTypeMeta(b.lesson.lesson_name);
      const date = new Date(...b.lesson.date.split('-').map((v,i)=>i===1?+v-1:+v));
      const _dp = b.lesson.date.split('-').map(Number);
      const _tp = (b.lesson.time || '0:0').split(':').map(Number);
      const _start = new Date(_dp[0], (_dp[1]||1)-1, _dp[2]||1, _tp[0]||0, _tp[1]||0, 0);
      const _cutoff = new Date(_start.getTime() - 10*60*1000);
      const _now = new Date();
      let _action, _extra = '', _meet = '';
      if (b.status === 'cancelled') {
        _action = '<span class="status-badge cancelled">キャンセル済み</span>';
        _extra = ' cancelled';
      } else if (_now >= _start) {
        _action = '<span class="status-badge done">受講済み</span>';
      } else if (_now >= _cutoff) {
        _action = '<span class="status-badge soon">受講予定</span>';
      } else {
        _action = '<button class="cancel-btn" onclick="cancelBooking(\'' + b.id + '\')">キャンセル</button>';
      }
      // 未来の予約（受講予定 + 予約中）にMeetボタンを差し込み
      if (b.status !== 'cancelled' && _now < _start) {
        const _mc = COACH_MEET_CODE[b.lesson.coach];
        if (_mc) _meet = '<a class="meet-btn" href="https://meet.google.com/' + _mc + '" target="_blank" rel="noopener">📹 Meet</a>';
      }
      html += '<div class="lesson-card ' + t.cls + _extra + '">'
        + '<div class="lesson-time-block">'
        +   '<div style="font-size:11px;color:var(--text-soft)">' + (date.getMonth()+1) + '/' + date.getDate() + '(' + WEEKDAYS[date.getDay()] + ')</div>'
        +   '<div class="lesson-time">' + b.lesson.time + '</div>'
        + '</div>'
        + '<div class="lesson-body">'
        +   '<div class="lesson-name">' + b.lesson.lesson_name + '</div>'
        +   '<div class="lesson-meta">担当: ' + b.lesson.coach + ' コーチ</div>'
        + '</div>'
        + _meet
        + _action
        + '</div>';
    }
  }
  c.innerHTML = html;
}

function updateBookingCount() {
  const el = document.getElementById('bookingCount');
  if (!el) return;
  const n = (bookingsCache && bookingsCache.bookings) ? bookingsCache.bookings.length : 0;
  el.textContent = n > 0 ? '📋 予約 ' + n + '件' : '';
}

function updateBalanceBar() {
  const bar = document.getElementById('balanceBar');
  const planEl = document.getElementById('planLabel');
  const remEl = document.getElementById('remainingLabel');
  if (!bar || !planEl || !remEl) return;

  if (!balanceCache || !balanceCache.has_plan) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';
  planEl.textContent = '💎 プラン：' + (balanceCache.plan || '—');

  // 楽観的更新：bookingsCacheから当月予約数をリアルタイム計算
  let usedNow = balanceCache.used_this_month || 0;
  if (bookingsCache && bookingsCache.bookings) {
    const monthStr = balanceCache.month || (new Date()).toISOString().slice(0, 7);
    usedNow = Math.max(usedNow, bookingsCache.bookings.filter(b => b.lesson_id && String(b.lesson_id).startsWith(monthStr)).length);
  }
  const limit = balanceCache.monthly_limit || 0;
  const remaining = Math.max(0, limit - usedNow);
  let color = 'var(--primary)';
  if (remaining === 0) color = '#d4767a';
  else if (remaining === 1) color = '#e89060';
  remEl.style.color = color;
  remEl.innerHTML = '今月の残り <span style="font-size:14px">' + remaining + '</span> / ' + limit + ' 回';
}

async function fetchMyBalance() {
  // localStorage 即座フォールバック
  const lc = lcGet('balance_' + LINE_USER_ID);
  if (lc && lc.balance && (Date.now() - lc.fetchedAt < 5 * 60 * 1000)) {
    balanceCache = lc.balance;
    updateBalanceBar();
    if (Date.now() - lc.fetchedAt > CACHE_TTL_MS) refreshBalance();
    return;
  }
  await refreshBalance();
}

async function refreshBalance() {
  const params = { line_user_id: LINE_USER_ID };
  if (DISPLAY_NAME) params.display_name = DISPLAY_NAME;
  const r = await api('my-balance', params);
  if (r && r.ok) {
    balanceCache = r;
    lcSet('balance_' + LINE_USER_ID, { balance: r, fetchedAt: Date.now() });
    updateBalanceBar();
  }
}

// ==========================================================================
// 受講履歴
// ==========================================================================
let currentHistoryPeriod = 'month';

function switchHistoryPeriod(period) {
  currentHistoryPeriod = period;
  document.querySelectorAll('.hp-btn').forEach((btn, i) => {
    const periods = ['month', 'year', 'all'];
    btn.classList.toggle('active', periods[i] === period);
  });
  loadHistory();
}

async function loadHistory() {
  const container = document.getElementById('historyContent');
  if (!container) return;

  // キャッシュから即時表示
  const lc = lcGet('history_' + LINE_USER_ID + '_' + currentHistoryPeriod);
  if (lc && lc.data && (Date.now() - lc.fetchedAt < 5 * 60 * 1000)) {
    renderHistory(lc.data);
    if (Date.now() - lc.fetchedAt > CACHE_TTL_MS) refreshHistory();
    return;
  }
  container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-soft);">読み込み中…</div>';
  await refreshHistory();
}

async function refreshHistory() {
  const params = {
    line_user_id: LINE_USER_ID,
    period: currentHistoryPeriod
  };
  if (DISPLAY_NAME) params.name = DISPLAY_NAME;
  const r = await api('history', params);
  if (r && r.ok) {
    lcSet('history_' + LINE_USER_ID + '_' + currentHistoryPeriod,
      { data: r, fetchedAt: Date.now() });
    renderHistory(r);
  } else {
    const container = document.getElementById('historyContent');
    if (container) {
      container.innerHTML = '<div class="h-empty">履歴の取得に失敗しました<br><small>' + (r && r.error || '') + '</small></div>';
    }
  }
}

function renderHistory(data) {
  const container = document.getElementById('historyContent');
  if (!container) return;

  if (!data || data.total === 0) {
    container.innerHTML = '<div class="h-empty">📭<br>この期間の受講履歴はまだありません<br><br><small>※レッスン受講後、コーチが実施報告を提出すると<br>こちらに反映されます</small></div>';
    return;
  }

  const periodLabel = data.period === 'month' ? '今月' : data.period === 'year' ? '今年' : '全期間';
  const total = data.total || 0;

  // ===== 合計 =====
  let html = '<div class="h-total">';
  html += '<div class="num">' + total + '<span class="unit">回</span></div>';
  html += '<div class="lab">' + periodLabel + 'の受講回数</div>';
  html += '</div>';

  // ===== レッスン別 =====
  if (data.byLesson && Object.keys(data.byLesson).length > 0) {
    const lessonEntries = Object.entries(data.byLesson).sort((a, b) => b[1] - a[1]);
    const maxLesson = lessonEntries[0][1];
    html += '<div class="h-section">';
    html += '<h3>📊 レッスン別</h3>';
    html += '<div class="h-card">';
    for (const [name, count] of lessonEntries) {
      const pct = Math.max(8, (count / maxLesson) * 100);
      html += '<div class="h-lesson-row">';
      html += '<span class="name">' + escapeHtml(name) + '</span>';
      html += '<span class="bar-wrap"><span class="bar" style="width:' + pct + '%"></span></span>';
      html += '<span class="cnt">' + count + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // ===== 月別グラフ =====
  if (data.period !== 'month' && data.byMonth && Object.keys(data.byMonth).length > 0) {
    const monthEntries = Object.entries(data.byMonth);
    const maxMonth = Math.max(1, ...monthEntries.map(e => e[1]));
    html += '<div class="h-section">';
    html += '<h3>📅 月別</h3>';
    html += '<div class="h-card">';
    html += '<div class="h-month-chart">';
    for (const [month, count] of monthEntries) {
      const hRatio = count / maxMonth;
      const heightPx = Math.max(2, Math.round(hRatio * 100));
      const monthShort = month.split('-')[1] + '月';
      const zeroClass = count === 0 ? ' zero' : '';
      html += '<div class="h-month-col">';
      html += '<span class="h-month-cnt">' + count + '</span>';
      html += '<div class="h-month-bar' + zeroClass + '" style="height:' + heightPx + 'px"></div>';
      html += '<span class="h-month-lab">' + monthShort + '</span>';
      html += '</div>';
    }
    html += '</div>';
    html += '</div></div>';
  }

  // ===== 直近の受講 =====
  if (data.recent && data.recent.length > 0) {
    html += '<div class="h-section">';
    html += '<h3>🌸 直近の受講（' + Math.min(data.recent.length, 30) + '件）</h3>';
    html += '<div class="h-card">';
    for (const r of data.recent) {
      const dateShort = r.date.substring(5).replace('-', '/'); // MM/DD
      html += '<div class="h-recent-item">';
      html += '<span class="date">' + dateShort + '</span>';
      html += '<span class="lesson">' + escapeHtml(r.lesson) + '</span>';
      html += '<span class="coach">' + escapeHtml(r.coach) + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  container.innerHTML = html;
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

async function cancelBooking(bookingId) {
  if (!confirm('この予約をキャンセルしますか？')) return;

  // ★即座にUI更新（API応答を待たない）
  let cancelledLessonId = null;
  let cancelledBooking = null;
  let cancelledIndex = -1;
  if (bookingsCache) {
    cancelledBooking = bookingsCache.bookings.find(b => b.id === bookingId);
    if (cancelledBooking) {
      cancelledLessonId = cancelledBooking.lesson_id;
      cancelledBooking.status = 'cancelled';
      bookingsCache.fetchedAt = Date.now();
    }
  }
  if (cancelledLessonId) {
    for (const l of allLessons) {
      if (l.id === cancelledLessonId) {
        l.booked = Math.max(0, (l.booked || 0) - 1);
        l.available = Math.min(l.capacity || 3, l.available + 1);
        break;
      }
    }
  }
  if (bookingsCache) lcSet('bookings_' + LINE_USER_ID, bookingsCache);
  const cacheKey = currentYear + '-' + currentMonth;
  if (monthCache.has(cacheKey)) lcSet('lessons_' + cacheKey, monthCache.get(cacheKey));

  showToast('キャンセルしました', 'success');
  renderCalendar();
  if (selectedDate) selectDate(selectedDate);
  if (document.getElementById('view-mybookings').classList.contains('active')) {
    renderBookingsHTML(bookingsCache ? bookingsCache.bookings : []);
  }
  updateBookingCount();
  updateBalanceBar();

  // 裏でAPI送信
  try {
    const r = await api('cancel', {}, 'POST', { booking_id: bookingId, line_user_id: LINE_USER_ID });
    if (!r.ok) {
      // 失敗：ロールバック
      if (bookingsCache && cancelledBooking) {
        cancelledBooking.status = 'active';
        bookingsCache.fetchedAt = Date.now();
        lcSet('bookings_' + LINE_USER_ID, bookingsCache);
      }
      if (cancelledLessonId) {
        for (const l of allLessons) {
          if (l.id === cancelledLessonId) {
            l.booked = (l.booked || 0) + 1;
            l.available = Math.max(0, l.available - 1);
            break;
          }
        }
      }
      if (monthCache.has(cacheKey)) lcSet('lessons_' + cacheKey, monthCache.get(cacheKey));
      renderCalendar();
      if (selectedDate) selectDate(selectedDate);
      if (document.getElementById('view-mybookings').classList.contains('active')) {
        renderBookingsHTML(bookingsCache ? bookingsCache.bookings : []);
      }
      updateBookingCount();
      updateBalanceBar();
      showToast(r.error || 'キャンセルに失敗しました', 'error');
    }
  } catch (e) {
    showToast('通信エラー: ' + e.message + '（再読み込みしてください）', 'error');
  }
}

// ==========================================================================
// User info
// ==========================================================================
function updateUserInfo() {
  const el = document.getElementById('userInfo');
  if (LIFF_READY && DISPLAY_NAME) {
    el.innerHTML = '<span style="color:var(--line-green)">✓ LINE</span> ' + DISPLAY_NAME + ' さん';
  } else if (DISPLAY_NAME) {
    el.textContent = '👤 ' + DISPLAY_NAME + ' さん';
  } else {
    el.innerHTML = '👤 ゲスト <span style="color:#aaa;font-size:10px">' + LINE_USER_ID.slice(0,12) + '</span>';
  }
}

// ==========================================================================
// LIFF init
// ==========================================================================
async function initLiff() {
  if (typeof liff === 'undefined') return false;
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isInClient() && !liff.isLoggedIn()) {
      // ブラウザ直アクセスで未ログインの場合は LINE Login を強制しない（ゲストモード）
      return false;
    }
    LIFF_PROFILE = await liff.getProfile();
    LINE_USER_ID = LIFF_PROFILE.userId;
    if (LIFF_PROFILE.displayName && !DISPLAY_NAME) {
      DISPLAY_NAME = LIFF_PROFILE.displayName;
    }
    LIFF_READY = true;
    localStorage.setItem('rimina_user_id', LINE_USER_ID);
    localStorage.setItem('rimina_display_name', DISPLAY_NAME);
    return true;
  } catch (e) {
    console.log('LIFF init failed (going to guest mode):', e && e.message);
    return false;
  }
}

// ==========================================================================
// Init
// ==========================================================================
async function init() {
  // LIFF初期化を試みる（LINE内で開かれてれば成功、ブラウザ直アクセスなら失敗してゲストモード）
  await initLiff();

  updateUserInfo();

  // localStorageキャッシュからbookingsCacheを即座に復元
  const initialBookings = lcGet('bookings_' + LINE_USER_ID);
  if (initialBookings && initialBookings.bookings) {
    bookingsCache = initialBookings;
    updateBookingCount();
  }
  // 残レッスン数も即時表示（localStorageキャッシュから）
  fetchMyBalance();

  // URLパラメータでタブ指定があれば反映（リッチメニューからの ?tab=mybookings 用）
  const params = new URLSearchParams(location.search);
  const initialTab = params.get('tab');
  if (initialTab && ['calendar','coach','lesson','mybookings','history'].includes(initialTab)) {
    switchTab(initialTab);
  }

  loadMonth();
  backgroundRefreshBookings();
}

init();
